title: Local Stay Hotel & Suites Reception
views:
- title: Overview
  type: sections
  sections:
  - type: grid
    cards:
    - type: heading
      heading: Clock Integration
      badges:
      - type: entity
        entity: binary_sensor.clock_ha_orchestrator_online
      - type: entity
        entity: sensor.clock_last_successful_sync
      - type: entity
        entity: sensor.clock_sync_lag
    - type: tile
      entity: sensor.hotel_checked_in_rooms
      name: Checked In
    - type: tile
      entity: sensor.hotel_expected_rooms
      name: Expected
    - type: tile
      entity: sensor.hotel_arrivals_today
      name: Arrivals
    - type: tile
      entity: sensor.hotel_departures_today
      name: Departures
    - type: conditional
      conditions:
      - entity: sensor.hotel_room_conflicts
        state_not: '0'
      card:
        type: tile
        entity: sensor.hotel_room_conflicts
        color: red
- title: Arrivals
  type: sections
  sections:
  - type: grid
    cards:
    - type: heading
      heading: Today
    - type: entities
      entities:
      - sensor.hotel_arrivals_today
      - sensor.hotel_unassigned_arrivals
- title: Departures
  type: sections
  sections:
  - type: grid
    cards:
    - type: heading
      heading: Today
    - type: entities
      entities:
      - sensor.hotel_departures_today
- title: Alerts
  type: sections
  sections:
  - type: grid
    cards:
    - type: heading
      heading: Needs Attention
    - type: entities
      entities:
      - sensor.hotel_unassigned_arrivals
      - sensor.hotel_room_conflicts
      - sensor.clock_sync_lag
- title: Integration
  type: sections
  sections:
  - type: grid
    cards:
    - type: heading
      heading: Orchestrator
    - type: entities
      entities:
      - binary_sensor.clock_ha_orchestrator_online
      - sensor.clock_last_successful_sync
      - sensor.clock_sync_lag
- title: Floor 1
  type: sections
