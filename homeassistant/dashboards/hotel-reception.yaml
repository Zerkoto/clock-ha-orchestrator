    - type: entities
      title: Room 102
      entities:
      - sensor.room_102_pms_status
      - sensor.room_102_automation_phase
      - sensor.room_102_arrival
      - sensor.room_102_departure
      - sensor.room_102_desired_hvac_mode
      - sensor.room_102_desired_temperature
      - sensor.room_102_desired_water_heater
      - select.room_102_control_mode
      - select.room_102_manual_hvac_mode
      - number.room_102_manual_temperature
      - select.room_102_override_duration
      - switch.room_102_manual_water_heater
      - button.room_102_return_to_automatic
      - binary_sensor.room_102_needs_attention
- title: Floor 2
  type: sections
  sections:
  - type: grid
    cards:
    - type: heading
      heading: Floor 2
    - type: entities
      title: Room 214
      entities:
      - sensor.room_214_pms_status
      - sensor.room_214_automation_phase
      - sensor.room_214_arrival
      - sensor.room_214_departure
      - sensor.room_214_desired_hvac_mode
      - sensor.room_214_desired_temperature
      - sensor.room_214_desired_water_heater
      - select.room_214_control_mode
      - select.room_214_manual_hvac_mode
      - number.room_214_manual_temperature
      - select.room_214_override_duration
      - switch.room_214_manual_water_heater
      - button.room_214_return_to_automatic
