  - type: grid
    cards:
    - type: heading
      heading: Floor 1
    - type: entities
      title: Room 101
      entities:
      - sensor.room_101_pms_status
      - sensor.room_101_automation_phase
      - sensor.room_101_arrival
      - sensor.room_101_departure
      - sensor.room_101_desired_hvac_mode
      - sensor.room_101_desired_temperature
      - sensor.room_101_desired_water_heater
      - select.room_101_control_mode
      - select.room_101_manual_hvac_mode
      - number.room_101_manual_temperature
      - select.room_101_override_duration
      - switch.room_101_manual_water_heater
      - button.room_101_return_to_automatic
      - binary_sensor.room_101_needs_attention
    - type: entities
      title: Room 102
      entities:
      - sensor.room_102_pms_status
      - sensor.room_102_automation_phase
      - sensor.room_102_arrival
      - sensor.room_102_departure
      - sensor.room_102_desired_hvac_mode
      - sensor.room_102_desired_temperature
      - sensor.room_102_desired_water_heater
      - select.room_102_control_mode
      - select.room_102_manual_hvac_mode
      - number.room_102_manual_temperature
      - select.room_102_override_duration
      - switch.room_102_manual_water_heater
      - button.room_102_return_to_automatic
      - binary_sensor.room_102_needs_attention
