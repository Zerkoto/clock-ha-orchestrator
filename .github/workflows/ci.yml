name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clock_ha
          POSTGRES_USER: clock_ha
          POSTGRES_PASSWORD: clock_ha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clock_ha -d clock_ha"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://clock_ha:clock_ha_test@localhost:5432/clock_ha
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy app
      - run: pytest
      - run: alembic upgrade head
      - run: alembic downgrade -1
      - run: alembic upgrade head
      - run: docker build .
